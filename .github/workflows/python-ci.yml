name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stacks/market-research/worker
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system ruff pytest

      - name: Lint
        run: ruff check --output-format=github .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest -q --ignore=tests/test_analysis.py --ignore=tests/stress_youtube.py
        env:
          PG_DSN: postgresql://test@localhost/test
          OPENROUTER_API_KEY: test-key
