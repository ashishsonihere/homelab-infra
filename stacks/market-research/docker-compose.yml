# Market-Research stack — ONE place for all mr-* services (consolidation; supersedes the old
# crawl4ai/meili scaffold which was never used). Postgres + Redis are shared homelab infra
# (devcore-postgres / devcore-redis) on devcore_net — referenced, not redefined.
#
# Long-lived SERVICES live here. One-shot JOBS (connectors, analysis) run via the `worker` image:
#     docker compose -p market-research run --rm worker python -m connectors.<name>
#     docker compose -p market-research run --rm worker python analyze.py
# DEPLOY in the housekeeping window (after in-flight backfills finish) so mr-ollama isn't restarted mid-run:
#     docker compose -p market-research up -d ollama metabase
name: market-research

networks:
  devcore_net:
    external: true

volumes:
  mr_ollama:
  mr_metabase:

services:
  worker:                       # image for ALL connectors + jobs (run-and-exit, not kept up)
    build:
      context: ./worker
      dockerfile: Dockerfile.scrape
    image: mr-worker:scrape
    container_name: mr-worker
    profiles: ["jobs"]          # excluded from `up`; invoked via `compose run`
    working_dir: /app
    volumes:
      - ./worker:/app
      - /opt/market-research:/mr
    env_file: /opt/market-research/worker.env
    networks: [devcore_net]

  ollama:                       # local embeddings (free, CPU)
    image: ollama/ollama
    container_name: mr-ollama   # name preserved → connectors keep reaching http://mr-ollama:11434
    restart: unless-stopped
    volumes: [mr_ollama:/root/.ollama]
    networks: [devcore_net]

  metabase:                     # dashboards over Postgres
    image: metabase/metabase
    container_name: mr-metabase
    restart: unless-stopped
    ports: ["3030:3000"]
    volumes: [mr_metabase:/metabase-data]
    networks: [devcore_net]

  # DROPPED: meilisearch (Postgres pg_trgm + pgvector replace it) · crawl4ai (add later, only for
  # on-demand validation web-research of a SPECIFIC idea, not bulk collection).
